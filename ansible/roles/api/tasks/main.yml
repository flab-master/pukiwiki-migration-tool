---
- name: Install required packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: true

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Create deploy directory
  ansible.builtin.file:
    path: "{{ deploy_dir }}"
    state: directory
    mode: "0755"

- name: Create data directory for SQLite
  ansible.builtin.file:
    path: "{{ deploy_dir }}/data"
    state: directory
    mode: "0755"

- name: Copy migrated db file
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../pukiwiki-migration.db"
    dest: "{{ deploy_dir }}/data/pukiwiki-migration.db"
    mode: "0644"
    force: false  # 既存 db を上書きしない

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ deploy_dir }}/docker-compose.yml"
    mode: "0644"

- name: Login to GHCR
  ansible.builtin.command:
    cmd: docker login ghcr.io -u {{ ghcr_username }} --password-stdin
    stdin: "{{ ghcr_token }}"
  no_log: true

- name: Pull latest image from GHCR
  ansible.builtin.command:
    cmd: docker compose pull
    chdir: "{{ deploy_dir }}"

- name: Start services
  ansible.builtin.command:
    cmd: docker compose up -d --remove-orphans
    chdir: "{{ deploy_dir }}"

- name: Verify API health
  ansible.builtin.uri:
    url: "http://localhost:8080/health"
    method: GET
    status_code: 200
  retries: 5
  delay: 5
  register: health_check
  until: health_check.status == 200
